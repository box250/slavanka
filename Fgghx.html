<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подслушано в Славянке</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --gray: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #007aff;
            --danger: #ff3b30;
            --glass: rgba(10, 10, 10, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        
        #app { width: 100%; max-width: 500px; min-height: 100vh; margin: 0 auto; padding-bottom: 100px; }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 1000; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px; text-align: center; border-bottom: 1px solid var(--border);
        }
        .logo-text { font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        /* FEED */
        .post { margin-bottom: 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .post-header { display: flex; justify-content: space-between; padding: 12px 16px; align-items: center; }
        .author-info { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
        .author-icon { width: 32px; height: 32px; border-radius: 10px; background: #222; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }

        .post-media-container { width: 100%; background: #050505; position: relative; min-height: 300px; display: flex; align-items: center; overflow: hidden; }
        .post-media { width: 100%; display: block; object-fit: contain; }

        .post-content { padding: 12px 16px; }
        .post-actions { display: flex; gap: 20px; margin-bottom: 10px; }
        .action-icon { font-size: 24px; cursor: pointer; transition: 0.1s; }
        .action-icon.active { color: var(--danger); }
        
        .likes-bold { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .post-description { font-size: 14px; line-height: 1.4; color: #f2f2f2; }
        .comment-trigger { color: var(--gray); font-size: 13px; margin-top: 8px; cursor: pointer; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; 
            padding: 12px 0 30px; z-index: 1000;
        }
        .nav-link { font-size: 26px; cursor: pointer; filter: grayscale(1); opacity: 0.6; }
        #admin-plus-btn { display: none; color: var(--accent); filter: grayscale(0); opacity: 1; font-size: 30px; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; padding: 25px; }
        .modal-body { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .input-style { width: 100%; padding: 14px; margin-top: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }
        .btn-blue { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; margin-top: 15px; cursor: pointer; }

        /* COMMENTS */
        .comments-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 6000; flex-direction: column; }
        .comm-head { padding: 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700; }
        .comm-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .comm-row { margin-bottom: 15px; font-size: 14px; }
        .comm-row b { color: var(--accent); margin-right: 6px; }
        .comm-input-box { padding: 15px 15px 35px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--card); }

        /* PROFILE */
        .profile-wrap { padding: 40px 20px; text-align: center; }
        .big-avatar { width: 90px; height: 90px; border-radius: 25px; background: #1c1c1e; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app">
    <header><div class="logo-text">Подслушано Славянка</div></header>
    
    <div id="feed-container"></div>

    <div id="profile-container" style="display:none;">
        <div class="profile-wrap">
            <div class="big-avatar" id="my-avatar">?</div>
            <h2 id="my-name">Загрузка...</h2>
            <div style="display: flex; justify-content: center; gap: 40px; margin: 30px 0;">
                <div><b id="stat-m" style="font-size: 20px;">0</b><p style="color:var(--gray); font-size:12px;">Жителей</p></div>
                <div><b id="stat-p" style="font-size: 20px;">0</b><p style="color:var(--gray); font-size:12px;">Постов</p></div>
            </div>
            <button class="btn-blue" style="background: #262626;" onclick="logout()">Выйти</button>
        </div>
    </div>

    <nav>
        <div class="nav-link" onclick="setView('feed')">🏠</div>
        <div class="nav-link" id="admin-plus-btn" onclick="openM('post-m')">➕</div>
        <div class="nav-link" onclick="setView('profile')">👤</div>
        <div class="nav-link" onclick="openM('admin-m')" style="opacity:0.01">⚙️</div>
    </nav>
</div>

<div class="modal-overlay" id="reg-m" style="display:flex">
    <div class="modal-body">
        <h3 style="text-align:center">Славянка City</h3>
        <p style="text-align:center; margin-top:10px; color:var(--gray)">Введите ваше имя для входа в ленту</p>
        <input type="text" id="reg-name" class="input-style" placeholder="Ваше имя">
        <button class="btn-blue" onclick="saveMe()">Войти</button>
    </div>
</div>

<div class="modal-overlay" id="admin-m">
    <div class="modal-body">
        <h3>Доступ автора</h3>
        <input type="password" id="admin-pass" class="input-style" placeholder="Введите код">
        <button class="btn-blue" onclick="makeAdmin()">Подтвердить</button>
        <button onclick="closeM('admin-m')" style="background:none; border:none; color:var(--gray); width:100%; margin-top:15px">Отмена</button>
    </div>
</div>

<div class="modal-overlay" id="post-m">
    <div class="modal-body">
        <h3>Новый пост</h3>
        <textarea id="p-desc" class="input-style" placeholder="Описание..." rows="3"></textarea>
        <input type="file" id="p-file" class="input-style" accept="image/*,video/*">
        <button class="btn-blue" id="p-upload-btn" onclick="upload()">Опубликовать</button>
        <button onclick="closeM('post-m')" style="background:none; border:none; color:var(--gray); width:100%; margin-top:15px">Закрыть</button>
    </div>
</div>

<div class="comments-view" id="comm-v">
    <div class="comm-head"><span onclick="closeC()" style="cursor:pointer; font-size:20px">✕</span><span>Обсуждение</span><span></span></div>
    <div class="comm-scroll" id="comm-list"></div>
    <div class="comm-input-box">
        <input id="c-text" class="input-style" style="margin:0" placeholder="Написать жителям...">
        <button class="btn-blue" style="width:70px; margin:0; padding:10px" onclick="addC()">OK</button>
    </div>
</div>

<script>
    let db;
    let me = JSON.parse(localStorage.getItem('sl_u_v3')) || null;
    let isAdmin = localStorage.getItem('sl_adm_v3') === 'true';
    let members = JSON.parse(localStorage.getItem('sl_mem_v3')) || [];
    let currentP = null;

    const req = indexedDB.open("SlavyankaFinalRelease", 1);
    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("posts", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = e => { 
        db = e.target.result; 
        if(me) { document.getElementById('reg-m').style.display = 'none'; render(); }
        if(isAdmin) document.getElementById('admin-plus-btn').style.display = 'block';
    };

    function saveMe() {
        const n = document.getElementById('reg-name').value.trim();
        if(n) {
            me = { name: n, id: Date.now() };
            if(!members.includes(n)) members.push(n);
            localStorage.setItem('sl_u_v3', JSON.stringify(me));
            localStorage.setItem('sl_mem_v3', JSON.stringify(members));
            location.reload();
        }
    }

    function makeAdmin() {
        if(document.getElementById('admin-pass').value === "123321") {
            localStorage.setItem('sl_adm_v3', 'true');
            location.reload();
        }
    }

    async function upload() {
        const file = document.getElementById('p-file').files[0];
        if(!file) return alert("Файл не выбран");
        const btn = document.getElementById('p-upload-btn');
        btn.innerText = "Загрузка..."; btn.disabled = true;

        const base64 = await new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result);
        });

        const tx = db.transaction("posts", "readwrite");
        tx.objectStore("posts").add({
            desc: document.getElementById('p-desc').value,
            media: base64,
            type: file.type.startsWith('video') ? 'video' : 'image',
            likes: [],
            comms: []
        });
        tx.oncomplete = () => location.reload();
    }

    function render() {
        const feed = document.getElementById('feed-container');
        const tx = db.transaction("posts", "readonly");
        tx.objectStore("posts").getAll().onsuccess = e => {
            const posts = e.target.result.reverse();
            document.getElementById('stat-p').innerText = posts.length;
            feed.innerHTML = posts.map(p => {
                const liked = p.likes.includes(me.id);
                return `
                <div class="post">
                    <div class="post-header">
                        <div class="author-info"><div class="author-icon">🏙️</div>Автор Славянки</div>
                        ${isAdmin ? `<span onclick="delP(${p.id})" style="color:var(--danger); font-size:12px">Удалить</span>` : ''}
                    </div>
                    <div class="post-media-container" ondblclick="likeP(${p.id})">
                        ${p.type === 'video' ? `<video src="${p.media}" class="post-media" loop muted playsinline onclick="this.play()"></video>` : `<img src="${p.media}" class="post-media">`}
                    </div>
                    <div class="post-content">
                        <div class="post-actions">
                            <span class="action-icon ${liked ? 'active' : ''}" onclick="likeP(${p.id})">${liked ? '❤️' : '🤍'}</span>
                            <span class="action-icon" onclick="openC(${p.id})">💬</span>
                        </div>
                        <div class="likes-bold">${p.likes.length} отметок "Нравится"</div>
                        <div class="post-description">${p.desc}</div>
                        <div class="comment-trigger" onclick="openC(${p.id})">Посмотреть обсуждение (${p.comms.length})</div>
                    </div>
                </div>`;
            }).join('');
        };
    }

    function likeP(id) {
        const tx = db.transaction("posts", "readwrite");
        const s = tx.objectStore("posts");
        s.get(id).onsuccess = e => {
            const p = e.target.result;
            const idx = p.likes.indexOf(me.id);
            if(idx === -1) p.likes.push(me.id); else p.likes.splice(idx, 1);
            s.put(p).onsuccess = () => render();
        };
    }

    function openC(id) {
        currentP = id;
        document.getElementById('comm-v').style.display = 'flex';
        const list = document.getElementById('comm-list');
        db.transaction("posts").objectStore("posts").get(id).onsuccess = e => {
            const p = e.target.result;
            list.innerHTML = p.comms.map(c => `<div class="comm-row"><b>${c.u}</b> ${c.t}</div>`).join('') || '<p style="color:gray;text-align:center">Нет сообщений</p>';
        };
    }

    function addC() {
        const val = document.getElementById('c-text').value.trim();
        if(!val) return;
        const tx = db.transaction("posts", "readwrite");
        const s = tx.objectStore("posts");
        s.get(currentP).onsuccess = e => {
            const p = e.target.result;
            p.comms.push({ u: me.name, t: val });
            s.put(p).onsuccess = () => {
                document.getElementById('c-text').value = '';
                openC(currentP);
                render();
            };
        };
    }

    function delP(id) { if(confirm("Удалить?")) { db.transaction("posts", "readwrite").objectStore("posts").delete(id).onsuccess = () => render(); } }
    
    function setView(v) {
        document.getElementById('feed-container').style.display = v === 'feed' ? 'block' : 'none';
        document.getElementById('profile-container').style.display = v === 'profile' ? 'block' : 'none';
        if(v === 'profile') {
            document.getElementById('my-name').innerText = me.name;
            document.getElementById('my-avatar').innerText = me.name[0].toUpperCase();
            document.getElementById('stat-m').innerText = members.length;
        }
    }
    
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function closeC() { document.getElementById('comm-v').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
