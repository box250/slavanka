<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Славянка City | Admin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap">
    <style>
        :root { --bg: #000; --card: #121212; --border: #262626; --accent: #0095f6; --text: #fff; --gray: #a8a8a8; --danger: #ff3b30; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        #app { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        header { position: sticky; top: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }

        /* Посты */
        .post { border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 12px; font-size: 14px; }
        .header-left { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .author-ava { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); }
        .del-btn { color: var(--danger); font-size: 12px; font-weight: 500; cursor: pointer; padding: 5px; }
        
        .post-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #050505; }
        .post-actions { padding: 12px 12px 4px; display: flex; gap: 18px; font-size: 24px; }
        .action-icon { cursor: pointer; transition: 0.1s; }
        
        .post-info { padding: 0 12px; }
        .likes-count { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .post-desc { font-size: 14px; line-height: 1.4; }
        .post-desc b { margin-right: 8px; }
        .view-comments { color: var(--gray); font-size: 14px; margin-top: 6px; cursor: pointer; }

        /* Навигация */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 25px; z-index: 100; }
        .nav-item { font-size: 26px; cursor: pointer; }

        /* Профиль */
        .profile-head { padding: 40px 20px; text-align: center; }
        .profile-ava { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--border); }
        .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

        /* Комментарии */
        .comments-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .comm-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 700; }
        .comm-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .comm-item { margin-bottom: 15px; font-size: 14px; }
        .comm-item b { margin-right: 8px; color: var(--accent); }
        .comm-input-area { padding: 10px 15px 30px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

        /* Модалки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 15px; font-weight: 700; cursor: pointer; }
        #admin-add { display: none; color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <header><div class="logo">SLAVYANKA</div></header>
    
    <div id="view-feed"></div>

    <div id="view-profile" style="display:none;">
        <div class="profile-head">
            <img id="my-avatar-img" src="https://www.gravatar.com/avatar/0?d=mp" class="profile-ava">
            <div class="profile-name" id="my-name-display">...</div>
            <button class="btn" style="background:#262626" onclick="showM('modal-edit-profile')">Изменить профиль</button>
            <button class="btn" style="background:#262626; margin-top:10px" onclick="logout()">Выйти</button>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchView('feed')">🏠</div>
        <div class="nav-item" id="admin-add" onclick="showM('modal-post')">➕</div>
        <div class="nav-item" onclick="switchView('profile')">👤</div>
        <div class="nav-item" onclick="showM('modal-admin')" style="opacity:0.05">⚙️</div>
    </nav>
</div>

<div class="modal" id="modal-reg" style="display: flex;">
    <div class="modal-content">
        <h3 style="text-align:center">Вход в Славянку</h3>
        <input type="text" id="reg-name" placeholder="Ваше имя">
        <button class="btn" onclick="register()">Начать</button>
    </div>
</div>

<div class="modal" id="modal-edit-profile">
    <div class="modal-content">
        <h3>Настройки</h3>
        <input type="text" id="edit-name" placeholder="Новое имя">
        <input type="text" id="edit-ava" placeholder="Ссылка на фото аватарки">
        <button class="btn" onclick="updateProfile()">Сохранить</button>
        <button class="btn" style="background:none" onclick="hideM('modal-edit-profile')">Отмена</button>
    </div>
</div>

<div class="modal" id="modal-admin">
    <div class="modal-content">
        <h3>Доступ автора</h3>
        <input type="password" id="adm-pass" placeholder="Код">
        <button class="btn" onclick="checkAdm()">Подтвердить</button>
    </div>
</div>

<div class="modal" id="modal-post">
    <div class="modal-content">
        <h3>Новый пост</h3>
        <textarea id="p-text" placeholder="Описание к фото..."></textarea>
        <input type="file" id="p-file" accept="image/*">
        <button class="btn" id="up-btn" onclick="uploadPost()">Выложить</button>
        <button class="btn" style="background:none" onclick="hideM('modal-post')">Отмена</button>
    </div>
</div>

<div class="comments-panel" id="panel-comm">
    <div class="comm-header">Комментарии <span onclick="hideComm()" style="cursor:pointer">✕</span></div>
    <div class="comm-list" id="comm-render-box"></div>
    <div class="comm-input-area">
        <input id="comm-input" placeholder="Ваш комментарий...">
        <button onclick="addComment()" style="background:none; border:none; color:var(--accent); font-weight:700">OK</button>
    </div>
</div>

<script>
    const AUTH_AVATAR = "https://i.ibb.co/pPzFmRK/931.jpg"; 
    let user = JSON.parse(localStorage.getItem('sl_user_v4'));
    let isAdmin = localStorage.getItem('sl_adm') === 'true';
    let posts = JSON.parse(localStorage.getItem('sl_posts_v4')) || [];
    let activePostId = null;

    window.onload = () => {
        if(user) { 
            hideM('modal-reg'); 
            renderFeed(); 
            updateProfileUI();
        }
        if(isAdmin) document.getElementById('admin-add').style.display = 'block';
    };

    function register() {
        const n = document.getElementById('reg-name').value.trim();
        if(n) {
            user = { name: n, ava: "https://www.gravatar.com/avatar/0?d=mp", id: Date.now() };
            saveUser();
            location.reload();
        }
    }

    function checkAdm() { 
        if(document.getElementById('adm-pass').value === '123321') { 
            localStorage.setItem('sl_adm', 'true'); 
            location.reload(); 
        } else { alert('Неверный код'); }
    }

    function uploadPost() {
        const file = document.getElementById('p-file').files[0];
        if(!file) return alert("Выберите фото");
        const btn = document.getElementById('up-btn');
        btn.innerText = "Загрузка..."; btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const newPost = { id: Date.now(), img: e.target.result, text: document.getElementById('p-text').value, likes: [], comms: [] };
            posts.unshift(newPost);
            savePosts();
            location.reload();
        };
    }

    // НОВАЯ ФУНКЦИЯ УДАЛЕНИЯ
    function deletePost(id) {
        if(confirm("Вы уверены, что хотите удалить этот пост?")) {
            posts = posts.filter(p => p.id !== id);
            savePosts();
            renderFeed();
        }
    }

    function renderFeed() {
        const container = document.getElementById('view-feed');
        if (posts.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:gray; margin-top:100px;">Постов пока нет</div>';
            return;
        }
        container.innerHTML = posts.map(p => {
            const liked = p.likes.includes(user.id);
            return `
            <div class="post">
                <div class="post-header">
                    <div class="header-left">
                        <img src="${AUTH_AVATAR}" class="author-ava"> 
                        <span>Автор Славянки</span>
                    </div>
                    ${isAdmin ? `<div class="del-btn" onclick="deletePost(${p.id})">Удалить</div>` : ''}
                </div>
                <img src="${p.img}" class="post-media" ondblclick="like(${p.id})">
                <div class="post-actions">
                    <span class="action-icon" onclick="like(${p.id})">${liked?'❤️':'🤍'}</span>
                    <span class="action-icon" onclick="showComm(${p.id})">💬</span>
                </div>
                <div class="post-info">
                    <div class="likes-count">${p.likes.length} отметок "Нравится"</div>
                    <div class="post-desc"><b>Автор_Славянки</b> ${p.text}</div>
                    <div class="view-comments" onclick="showComm(${p.id})">Посмотреть комментарии (${p.comms.length})</div>
                </div>
            </div>`;
        }).join('');
    }

    function like(id) {
        const p = posts.find(x => x.id === id);
        if(!p) return;
        const idx = p.likes.indexOf(user.id);
        if(idx === -1) p.likes.push(user.id); else p.likes.splice(idx, 1);
        savePosts(); renderFeed();
    }

    function showComm(id) {
        activePostId = id;
        const p = posts.find(x => x.id === id);
        document.getElementById('panel-comm').style.display = 'flex';
        document.getElementById('comm-render-box').innerHTML = p.comms.map(c => `
            <div class="comm-item"><b>${c.u}</b> ${c.t}</div>
        `).join('') || '<p style="color:gray; text-align:center">Будьте первыми!</p>';
    }

    function addComment() {
        const val = document.getElementById('comm-input').value.trim();
        if(!val) return;
        const p = posts.find(x => x.id === activePostId);
        p.comms.push({ u: user.name, t: val });
        savePosts();
        document.getElementById('comm-input').value = '';
        showComm(activePostId);
        renderFeed();
    }

    function updateProfile() {
        const n = document.getElementById('edit-name').value.trim();
        const a = document.getElementById('edit-ava').value.trim();
        if(n) user.name = n;
        if(a) user.ava = a;
        saveUser();
        location.reload();
    }

    function switchView(v) {
        document.getElementById('view-feed').style.display = v === 'feed' ? 'block' : 'none';
        document.getElementById('view-profile').style.display = v === 'profile' ? 'block' : 'none';
    }

    function updateProfileUI() {
        document.getElementById('my-name-display').innerText = user.name;
        document.getElementById('my-avatar-img').src = user.ava;
    }

    function saveUser() { localStorage.setItem('sl_user_v4', JSON.stringify(user)); }
    function savePosts() { localStorage.setItem('sl_posts_v4', JSON.stringify(posts)); }
    function showM(id) { document.getElementById(id).style.display = 'flex'; }
    function hideM(id) { document.getElementById(id).style.display = 'none'; }
    function hideComm() { document.getElementById('panel-comm').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
