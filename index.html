<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Славянка City | Общая лента</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <style>
        :root { --bg: #000; --border: #262626; --accent: #0095f6; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); -webkit-user-select: none; }
        #app { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--border); text-align: center; z-index: 100; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        .post { border-bottom: 1px solid var(--border); margin-bottom: 10px; opacity: 0; animation: show 0.5s forwards; }
        @keyframes show { to { opacity: 1; } }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 10px; font-weight: 600; font-size: 14px; }
        .author-ava { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 10px; }
        .post-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }
        .post-actions { padding: 12px; display: flex; gap: 20px; font-size: 24px; }
        .post-info { padding: 0 12px 15px; font-size: 14px; }

        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 100; }
        .nav-item { font-size: 26px; cursor: pointer; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #121212; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header><div class="logo">SLAVYANKA.CITY</div></header>
    <div id="feed"><p style="text-align:center; padding:50px; color:gray;">Загрузка ленты...</p></div>
    
    <nav>
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" id="admin-add" style="display:none" onclick="showM('post-m')">➕</div>
        <div class="nav-item" onclick="showM('reg-m')">👤</div>
        <div class="nav-item" onclick="showM('adm-m')" style="opacity:0.01">⚙️</div>
    </nav>
</div>

<div class="modal" id="reg-m">
    <div class="m-box">
        <h3 id="u-name-display">Профиль</h3>
        <input id="r-name" placeholder="Твое имя">
        <button class="btn" onclick="saveU()">Сохранить</button>
        <button class="btn" style="background:none" onclick="hideM('reg-m')">Закрыть</button>
    </div>
</div>

<div class="modal" id="post-m">
    <div class="m-box">
        <h3>Новый пост</h3>
        <textarea id="p-text" placeholder="Описание..."></textarea>
        <input type="file" id="p-file" accept="image/*">
        <button class="btn" id="up-btn" onclick="upload()">Опубликовать</button>
    </div>
</div>

<div class="modal" id="adm-m">
    <div class="m-box">
        <input type="password" id="a-pass" placeholder="Код автора">
        <button class="btn" onclick="loginA()">Войти</button>
    </div>
</div>

<script>
    // Настройки "облака" (JSONbin.io)
    const BIN_ID = "65f0a3e81f5677401f3c3f2d"; // Твой личный ID хранилища
    const API_KEY = "$2a$10$Y7L/N.z7v6R4k4j6R6k6R.z7v6R4k4j6R6k6R.z7v6R4k4j6R6"; // Ключ доступа
    const MASTER_AVA = "https://i.ibb.co/pPzFmRK/931.jpg";

    let user = JSON.parse(localStorage.getItem('sl_u')) || {name: "Гость", id: Date.now()};
    let isAdmin = localStorage.getItem('sl_a') === 'true';
    let allPosts = [];

    window.onload = async () => {
        if(isAdmin) document.getElementById('admin-add').style.display='block';
        document.getElementById('u-name-display').innerText = user.name;
        await loadFromCloud();
    }

    async function loadFromCloud() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await res.json();
            allPosts = data.record.posts || [];
            render();
        } catch(e) { console.error("Ошибка сети"); }
    }

    async function saveToCloud() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ posts: allPosts })
        });
    }

    async function upload() {
        const f = document.getElementById('p-file').files[0];
        if(!f) return alert("Выбери фото");
        const btn = document.getElementById('up-btn');
        btn.innerText = "В облако..."; btn.disabled = true;

        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = async () => {
            allPosts.unshift({
                id: Date.now(),
                img: r.result,
                text: document.getElementById('p-text').value,
                likes: []
            });
            await saveToCloud();
            location.reload();
        }
    }

    function render() {
        const f = document.getElementById('feed');
        if(allPosts.length === 0) f.innerHTML = '<p style="text-align:center;padding:50px">Пока пусто</p>';
        else f.innerHTML = allPosts.map(p => `
            <div class="post">
                <div class="post-header">
                    <div><img src="${MASTER_AVA}" class="author-ava">Автор Славянки</div>
                    ${isAdmin ? `<span onclick="del(${p.id})" style="color:red">Удалить</span>` : ''}
                </div>
                <img src="${p.img}" class="post-media">
                <div class="post-actions">
                    <span onclick="like(${p.id})">${p.likes.includes(user.id)?'❤️':'🤍'}</span>
                </div>
                <div class="post-info">
                    <b>${p.likes.length} лайков</b><br>
                    <b>Автор_Славянки</b> ${p.text}
                </div>
            </div>`).join('');
    }

    async function like(id) {
        let p = allPosts.find(x=>x.id===id);
        let i = p.likes.indexOf(user.id);
        if(i===-1) p.likes.push(user.id); else p.likes.splice(i,1);
        render();
        await saveToCloud();
    }

    async function del(id) {
        if(confirm("Удалить?")) {
            allPosts = allPosts.filter(x=>x.id!==id);
            await saveToCloud();
            render();
        }
    }

    function saveU() {
        const n = document.getElementById('r-name').value;
        if(n) { user.name = n; localStorage.setItem('sl_u', JSON.stringify(user)); location.reload(); }
    }

    function loginA() { if(document.getElementById('a-pass').value==='123321'){ localStorage.setItem('sl_a','true'); location.reload(); } }
    function showM(id) { document.getElementById(id).style.display='flex'; }
    function hideM(id) { document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
