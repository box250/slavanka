<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подслушано Славянка</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <style>
        :root { --bg: #000; --border: #262626; --accent: #0095f6; --text: #fff; --gray: #a8a8a8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        #app { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; border: 1px solid var(--border); }
        
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--border); text-align: center; z-index: 100; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        .post { border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 10px; font-weight: 600; font-size: 14px; }
        .author-ava { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 10px; }
        .post-media { width: 100%; display: block; background: #111; }
        .post-actions { padding: 12px; display: flex; gap: 15px; font-size: 24px; }
        .post-info { padding: 0 12px 12px; font-size: 14px; }
        
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 100; }
        .nav-item { font-size: 26px; cursor: pointer; }
        #admin-btn { display: none; color: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #121212; padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 15px; font-weight: 700; cursor: pointer; }
        
        .comm-row { margin-bottom: 8px; text-align: left; }
        .comm-row b { color: var(--accent); margin-right: 5px; }
    </style>
</head>
<body>

<div id="app">
    <header><div class="logo">SLAVYANKA CITY</div></header>
    <div id="feed"></div>
    <div id="profile" style="display:none; padding:50px 20px; text-align:center;">
        <img id="p-ava" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--border)">
        <h2 id="p-name" style="margin:15px 0"></h2>
        <button class="btn" onclick="showM('edit-m')">Изменить профиль</button>
        <button class="btn" style="background:#333" onclick="localStorage.clear();location.reload()">Выйти</button>
    </div>
    <nav>
        <div class="nav-item" onclick="setView('feed')">🏠</div>
        <div class="nav-item" id="admin-btn" onclick="showM('post-m')">➕</div>
        <div class="nav-item" onclick="setView('profile')">👤</div>
        <div class="nav-item" onclick="showM('adm-m')" style="opacity:0.01">⚙️</div>
    </nav>
</div>

<div class="modal" id="reg-m" style="display:flex">
    <div class="m-box">
        <h3>Добро пожаловать</h3>
        <input id="r-name" placeholder="Твое имя">
        <button class="btn" onclick="reg()">Войти</button>
    </div>
</div>

<div class="modal" id="post-m">
    <div class="m-box">
        <h3>Новый пост</h3>
        <textarea id="up-text" placeholder="Описание..."></textarea>
        <input type="file" id="up-file" accept="image/*">
        <button class="btn" id="up-load" onclick="upload()">Опубликовать</button>
        <button class="btn" style="background:none" onclick="hideM('post-m')">Отмена</button>
    </div>
</div>

<div class="modal" id="edit-m">
    <div class="m-box">
        <h3>Профиль</h3>
        <input id="e-name" placeholder="Имя">
        <input id="e-ava" placeholder="Ссылка на фото (URL)">
        <button class="btn" onclick="updateP()">Сохранить</button>
    </div>
</div>

<div class="modal" id="adm-m">
    <div class="m-box">
        <input type="password" id="a-pass" placeholder="Код автора">
        <button class="btn" onclick="loginA()">ОК</button>
    </div>
</div>

<div class="modal" id="comm-m">
    <div class="m-box" style="max-height:80vh; overflow-y:auto">
        <div id="c-list"></div>
        <input id="c-input" placeholder="Ваш комментарий...">
        <button class="btn" onclick="addC()">Отправить</button>
        <button class="btn" style="background:none" onclick="hideM('comm-m')">Закрыть</button>
    </div>
</div>

<script>
    // Твое фото заката
    const MASTER_AVA = "https://i.ibb.co/pPzFmRK/931.jpg";
    let user = JSON.parse(localStorage.getItem('sl_u')) || null;
    let isAdmin = localStorage.getItem('sl_a') === 'true';
    let posts = JSON.parse(localStorage.getItem('sl_p')) || [];
    let curP = null;

    window.onload = () => {
        if(user) { hideM('reg-m'); render(); updateUI(); }
        if(isAdmin) document.getElementById('admin-btn').style.display='block';
    }

    function reg() {
        const n = document.getElementById('r-name').value;
        if(n) { user = {name:n, ava:'https://www.gravatar.com/avatar?d=mp', id:Date.now()}; saveU(); location.reload(); }
    }

    function upload() {
        const f = document.getElementById('up-file').files[0];
        if(!f) return;
        const btn = document.getElementById('up-load');
        btn.innerText = "Загрузка..."; btn.disabled = true;
        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = () => {
            posts.unshift({id:Date.now(), img:r.result, text:document.getElementById('up-text').value, likes:[], comms:[]});
            saveP(); location.reload();
        }
    }

    function render() {
        const f = document.getElementById('feed');
        f.innerHTML = posts.map(p => `
            <div class="post">
                <div class="post-header">
                    <div><img src="${MASTER_AVA}" class="author-ava">Автор Славянки</div>
                    ${isAdmin ? `<span onclick="del(${p.id})" style="color:red">Удалить</span>` : ''}
                </div>
                <img src="${p.img}" class="post-media" ondblclick="like(${p.id})">
                <div class="post-actions">
                    <span onclick="like(${p.id})">${p.likes.includes(user.id)?'❤️':'🤍'}</span>
                    <span onclick="openC(${p.id})">💬</span>
                </div>
                <div class="post-info">
                    <b>${p.likes.length} отметок</b><br>
                    <b>Автор_Славянки</b> ${p.text}
                    <div style="color:gray; margin-top:5px" onclick="openC(${p.id})">Комментарии (${p.comms.length})</div>
                </div>
            </div>`).join('');
    }

    function like(id) {
        let p = posts.find(x=>x.id===id);
        let i = p.likes.indexOf(user.id);
        if(i===-1) p.likes.push(user.id); else p.likes.splice(i,1);
        saveP(); render();
    }

    function openC(id) {
        curP = id; showM('comm-m');
        let p = posts.find(x=>x.id===id);
        document.getElementById('c-list').innerHTML = p.comms.map(c=>`<div class="comm-row"><b>${c.u}:</b>${c.t}</div>`).join('') || 'Нет комментариев';
    }

    function addC() {
        const t = document.getElementById('c-input').value; if(!t) return;
        let p = posts.find(x=>x.id===curP);
        p.comms.push({u:user.name, t:t});
        document.getElementById('c-input').value = '';
        saveP(); openC(curP); render();
    }

    function del(id) { if(confirm("Удалить?")) { posts = posts.filter(x=>x.id!==id); saveP(); render(); } }
    function loginA() { if(document.getElementById('a-pass').value==='123321'){ localStorage.setItem('sl_a','true'); location.reload(); } }
    function updateP() { 
        const n = document.getElementById('e-name').value; if(n) user.name=n;
        const a = document.getElementById('e-ava').value; if(a) user.ava=a;
        saveU(); location.reload();
    }
    function saveU() { localStorage.setItem('sl_u', JSON.stringify(user)); }
    function saveP() { localStorage.setItem('sl_p', JSON.stringify(posts)); }
    function showM(id) { document.getElementById(id).style.display='flex'; }
    function hideM(id) { document.getElementById(id).style.display='none'; }
    function setView(v) {
        document.getElementById('feed').style.display = v==='feed'?'block':'none';
        document.getElementById('profile').style.display = v==='profile'?'block':'none';
        updateUI();
    }
    function updateUI() { document.getElementById('p-name').innerText=user.name; document.getElementById('p-ava').src=user.ava; }
</script>
</body>
</html>
